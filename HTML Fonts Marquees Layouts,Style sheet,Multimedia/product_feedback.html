<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Feedback</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="style.css"></head><body><div class="container mt-5"><div class="card p-4 shadow"><h2>Flipkart Product Feedback</h2><form><div class="mb-3"><label>Product Name</label><input class="form-control" type="text" required></div><div class="mb-3"><label>Rating</label><br><input type="radio" name="r" required>1 <input type="radio" name="r">2 <input type="radio" name="r">3 <input type="radio" name="r">4 <input type="radio" name="r">5</div><div class="mb-3"><label>Review</label><textarea class="form-control" required></textarea></div><div class="mb-3"><label>Upload Photo</label><input class="form-control" type="file"></div><button class="btn btn-primary" onclick="feedbackSubmitted()">Submit</button></form></div></div><script src="script.js"></script></body></html>
