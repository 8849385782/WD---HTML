<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music App Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <a href="index.html" class="btn btn-outline-secondary btn-sm">&larr; Back to Home</a>

      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="mb-4 text-center">🎧 TuneStream Login</h2>

          <form id="loginForm" class="js-demo-form" action="#" method="post" novalidate>

            <div class="mb-3">
              <label for="username" class="form-label">Username<span class="required-mark">*</span></label>
              <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required>
              <div class="invalid-feedback">Username is required.</div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password<span class="required-mark">*</span></label>
              <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required minlength="6">
              <div class="invalid-feedback">Password is required (minimum 6 characters).</div>
            </div>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="rememberMe" name="rememberMe">
              <label class="form-check-label" for="rememberMe">Remember me</label>
            </div>

            <button type="submit" class="btn btn-primary w-100">Log In</button>

            <div class="validation-alert alert" role="alert"></div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
