<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Review Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7">

      <a href="index.html" class="btn btn-outline-secondary btn-sm">&larr; Back to Home</a>

      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="mb-2 text-center">🍽️ Restaurant Review</h2>
          <p class="text-center text-muted small">
            This form uses <code>method="post"</code>, so your name, email, and comments
            are sent quietly in the request body instead of showing up in the URL.
          </p>

          <form id="reviewForm" class="js-demo-form" action="#" method="post" novalidate>

            <div class="mb-3">
              <label for="reviewerName" class="form-label">Your Name<span class="required-mark">*</span></label>
              <input type="text" class="form-control" id="reviewerName" name="reviewerName" placeholder="Enter your name" required>
              <div class="invalid-feedback">Please enter your name.</div>
            </div>

            <div class="mb-3">
              <label for="reviewerEmail" class="form-label">Email Address<span class="required-mark">*</span></label>
              <input type="email" class="form-control" id="reviewerEmail" name="reviewerEmail" placeholder="you@example.com" required>
              <div class="invalid-feedback">Please enter a valid email address.</div>
            </div>

            <div class="mb-3">
              <label for="comments" class="form-label">Your Review / Comments<span class="required-mark">*</span></label>
              <textarea class="form-control" id="comments" name="comments" rows="5" placeholder="Tell us about your experience..." required minlength="10"></textarea>
              <div class="invalid-feedback">Please write at least 10 characters about your experience.</div>
            </div>

            <button type="submit" class="btn btn-success w-100">Submit Review</button>

            <div class="validation-alert alert" role="alert"></div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
