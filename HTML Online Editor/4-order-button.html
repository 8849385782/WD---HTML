<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Place Order</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="order-body">
  <div class="order-box">
    <h2 class="mb-3">Confirm Your Order</h2>
    <p class="text-muted mb-4">Click the button below to place your order.</p>

    <div id="orderForm">
      <input type="text" id="customerName" class="form-control mb-3" placeholder="Enter your name">
      <div id="errorMsg" class="text-danger small mb-2" style="display:none;">Please enter your name before ordering.</div>
      <button id="orderBtn" class="btn btn-danger">Order Placed!</button>
    </div>
  </div>

  <script src="4-order-button.js"></script>
</body>
</html>
