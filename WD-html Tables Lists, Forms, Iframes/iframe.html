<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Favorite IPL Moment | Iframe</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body class="page-iframe">
<div class="container">
  <div class="video-card text-center">
    <h2 class="mb-3">🏏 My Favorite IPL Moment</h2>

    <!-- Replace VIDEO_ID below with the actual YouTube video ID from
         Share > Embed on the video you want to feature -->
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/VIDEO_ID"
      title="Favorite IPL Cricket Moment"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>

    <p class="mt-3 text-white-50">
      To use your own moment: go to the YouTube video → Share → Embed, copy the
      <code>src</code> URL, and paste it in place of the one above.
    </p>

    <div class="d-flex justify-content-between mt-4">
      <a href="form.html" class="btn btn-outline-light btn-sm">← Back</a>
      <a href="list-unordered.html" class="btn btn-warning btn-sm">Next: Apps List →</a>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
