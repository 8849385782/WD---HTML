<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Review Form | Flipkart Style</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body class="page-form">
<div class="container">
  <div class="form-card">
    <h2 class="text-center mb-4">🛒 Write a Product Review</h2>

    <div id="successMsg" class="alert alert-success" role="alert">
      ✅ Thank you! Your review was submitted successfully.
    </div>

    <form id="reviewForm" class="needs-validation" novalidate>
      <div class="mb-3">
        <label for="name" class="form-label">Your Name</label>
        <input type="text" class="form-control" id="name" required minlength="2">
        <div class="invalid-feedback">Please enter your name (min 2 characters).</div>
      </div>

      <div class="mb-3">
        <label for="product" class="form-label">Product Name</label>
        <input type="text" class="form-control" id="product" required>
        <div class="invalid-feedback">Please enter the product name.</div>
      </div>

      <div class="mb-3">
        <label for="rating" class="form-label">Rating (1–5)</label>
        <input type="number" class="form-control" id="rating" min="1" max="5" required>
        <div class="invalid-feedback">Please give a rating between 1 and 5.</div>
      </div>

      <div class="mb-3">
        <label for="review" class="form-label">Review Message</label>
        <textarea class="form-control" id="review" rows="4" required minlength="10"></textarea>
        <div class="invalid-feedback">Please write at least 10 characters.</div>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-flipkart">Submit Review</button>
      </div>
    </form>

    <div class="d-flex justify-content-between mt-4">
      <a href="list-ordered.html" class="btn btn-outline-secondary btn-sm">← Back</a>
      <a href="iframe.html" class="btn btn-outline-primary btn-sm">Next: Iframe →</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
