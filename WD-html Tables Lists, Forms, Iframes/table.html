<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Top 5 Favorite Foods | HTML Table</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body class="page-table">
<div class="container food-card">
  <h2 class="text-center mb-4">🍽️ My Top 5 Favorite Foods</h2>
  <table class="table table-striped table-bordered shadow-sm">
    <thead>
      <tr>
        <th>#</th>
        <th>Food Name</th>
        <th>Restaurant</th>
        <th>Price (₹)</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>Butter Chicken</td>
        <td>Punjabi Tadka</td>
        <td class="price">₹320</td>
      </tr>
      <tr>
        <td>2</td>
        <td>Margherita Pizza</td>
        <td>Domino's Pizza</td>
        <td class="price">₹249</td>
      </tr>
      <tr>
        <td>3</td>
        <td>Chicken Biryani</td>
        <td>Paradise Biryani</td>
        <td class="price">₹280</td>
      </tr>
      <tr>
        <td>4</td>
        <td>Masala Dosa</td>
        <td>Sagar Ratna</td>
        <td class="price">₹150</td>
      </tr>
      <tr>
        <td>5</td>
        <td>Chocolate Brownie Sundae</td>
        <td>Keventers</td>
        <td class="price">₹180</td>
      </tr>
    </tbody>
  </table>
  <div class="text-center mt-4">
    <a href="list-ordered.html" class="btn btn-outline-danger">Next: Ordered List →</a>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
