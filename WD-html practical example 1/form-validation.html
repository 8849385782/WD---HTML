<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form Validation</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body class="page-form">
<div class="container">
  <div class="form-card">
    <h2 class="mb-4">Contact Form</h2>

    <div id="successMsg" class="alert alert-success">Form submitted successfully!</div>

    <form id="myForm" novalidate>
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" required minlength="3">
        <div class="invalid-feedback">Please enter at least 3 characters.</div>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required>
        <div class="invalid-feedback">Please enter a valid email address.</div>
      </div>

      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="tel" class="form-control" id="phone" required pattern="[0-9]{10}">
        <div class="invalid-feedback">Please enter a 10-digit phone number.</div>
      </div>

      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
